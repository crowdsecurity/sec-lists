name: Sync Disposable Email Domains

on:
  schedule:
    - cron: "0 0 * * 0" # every Sunday at midnight
  workflow_dispatch: {} # manual trigger

permissions:
  contents: write

env:
  REMOTE_JSON_URL: "https://deviceandbrowserinfo.com/api/emails/disposable"
  CASTLE_LIST_URL: "https://raw.githubusercontent.com/castle/disposable-email-domains/master/disposable-email-domains.txt"
  OUTPUT_FILE: "appsec/disposable_email_domains.data"
  CROWDSEC_SOURCE_FILE: "appsec/crowdsec_disposable_email_domains.data"

jobs:
  sync-disposable-email-domains:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq curl

      - name: Download and validate sources
        run: |
          set -euo pipefail
          curl -fsSL "$REMOTE_JSON_URL" -o /tmp/domains.json
          # Fail if invalid JSON or not an array
          jq -e 'type == "array"' /tmp/domains.json > /dev/null
          curl -fsSL "$CASTLE_LIST_URL" -o /tmp/castle.txt
          # Fail if the Castle list came back empty
          [[ -s /tmp/castle.txt ]]

      - name: Merge remote + Castle + CrowdSec sources into output file
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$OUTPUT_FILE")"
          # Credit every source that feeds this merged list
          echo "# Sources: $REMOTE_JSON_URL (Antoine Vastel) + $CASTLE_LIST_URL (Castle) + $CROWDSEC_SOURCE_FILE (CrowdSec)" > /tmp/out.txt
          echo "# Thanks to Antoine Vastel and Castle for making their data available" >> /tmp/out.txt
          # Combine all sources, dropping comments/blanks,
          # then sort -u so the merged file is a single deduplicated list.
          {
            jq -r '.[]' /tmp/domains.json
            grep -vE '^\s*(#|$)' /tmp/castle.txt
            [[ -f "$CROWDSEC_SOURCE_FILE" ]] && grep -vE '^\s*(#|$)' "$CROWDSEC_SOURCE_FILE" || true
          } | sort -u >> /tmp/out.txt
          [[ -f "$OUTPUT_FILE" ]] || : > "$OUTPUT_FILE"
          # Only replace if content actually changed
          if cmp -s /tmp/out.txt "$OUTPUT_FILE"; then
            echo "No changes detected."
            echo "NEEDS_UPDATE=false" >> $GITHUB_ENV
          else
            mv /tmp/out.txt "$OUTPUT_FILE"
            echo "NEEDS_UPDATE=true" >> $GITHUB_ENV
          fi

      - name: Commit changes (skip if no changes)
        if: env.NEEDS_UPDATE == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$OUTPUT_FILE"
          git commit -m "Weekly sync: update from $REMOTE_JSON_URL" || exit 0

      - name: Push to master
        if: env.NEEDS_UPDATE == 'true'
        run: |
          set -euo pipefail
          git push origin HEAD:master
